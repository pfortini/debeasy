{{define "partials/create_table.html"}}
{{$b := .}}
<div class="modal-back" onclick="if(event.target===this) document.getElementById('modal').innerHTML=''">
  <div class="modal-panel modal-wide">
    <header class="modal-head"><h3>new table</h3>
      <button class="btn btn-icon" onclick="document.getElementById('modal').innerHTML=''">✕</button></header>
    {{if $b.Err}}<div class="form-err">{{$b.Err}}</div>{{end}}
    <form class="form"
          hx-post="/conn/{{$b.Conn.ID}}/create/table"
          hx-swap="none"
          hx-on::after-request="if(event.detail.successful) { document.getElementById('modal').innerHTML=''; htmx.trigger(document.body,'tree-refresh'); }">
      <div class="form-grid">
        <label>schema<input name="schema" value="{{$b.Schema}}" {{if eq $b.Kind "sqlite"}}placeholder="(unused)"{{end}}></label>
        <label>name<input name="name" required></label>
      </div>
      <table class="data-table" id="cols-table">
        <thead><tr><th>name</th><th>type</th><th>null</th><th>pk</th><th>default</th><th></th></tr></thead>
        <tbody id="cols-body">
          <tr>
            <td><input name="col_name" value="id" required></td>
            <td><input name="col_type" value="{{if eq $b.Kind "postgres"}}SERIAL{{else if eq $b.Kind "mysql"}}INT AUTO_INCREMENT{{else}}INTEGER{{end}}" required></td>
            <td><input type="hidden" name="col_nullable" value="0"><span class="muted">no</span></td>
            <td><input type="hidden" name="col_pk" value="1"><span class="chip chip-ok">PK</span></td>
            <td><input name="col_default"></td>
            <td></td>
          </tr>
          <tr>
            <td><input name="col_name" value="name"></td>
            <td><input name="col_type" value="TEXT"></td>
            <td><input type="checkbox" name="col_nullable" value="1" checked></td>
            <td><input type="checkbox" name="col_pk" value="1"></td>
            <td><input name="col_default"></td>
            <td><button type="button" class="btn btn-icon" onclick="this.closest('tr').remove()">✕</button></td>
          </tr>
        </tbody>
      </table>
      <button type="button" class="btn btn-sm" onclick="addCol()">+ column</button>
      <div class="form-row form-actions">
        <button type="button" class="btn btn-ghost" onclick="document.getElementById('modal').innerHTML=''">cancel</button>
        <button type="submit" class="btn btn-primary">create</button>
      </div>
    </form>
  </div>
</div>
<script>
function addCol(){
  const tr = document.createElement('tr');
  tr.innerHTML = `<td><input name="col_name" required></td>
                  <td><input name="col_type" value="TEXT" required></td>
                  <td><input type="checkbox" name="col_nullable" value="1" checked></td>
                  <td><input type="checkbox" name="col_pk" value="1"></td>
                  <td><input name="col_default"></td>
                  <td><button type="button" class="btn btn-icon" onclick="this.closest('tr').remove()">✕</button></td>`;
  document.getElementById('cols-body').appendChild(tr);
}
</script>
{{end}}
