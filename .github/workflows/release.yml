name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,  arch: amd64 }
          - { os: linux,  arch: arm64 }
          - { os: darwin, arch: amd64 }
          - { os: darwin, arch: arm64 }
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: build
        env:
          GOOS:        ${{ matrix.os }}
          GOARCH:      ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          out="dist/debeasy-${GOOS}-${GOARCH}"
          mkdir -p dist
          # The CM6 bundle and all templates are committed, so this is a pure go build.
          go build -trimpath -ldflags="-s -w -X github.com/pfortini/debeasy/internal/version.Version=${GITHUB_REF_NAME}" -o "$out" ./cmd/debeasy
          (cd dist && sha256sum "debeasy-${GOOS}-${GOARCH}" > "debeasy-${GOOS}-${GOARCH}.sha256")
          ls -lh "$out"

      - uses: actions/upload-artifact@v7
        with:
          name: debeasy-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: list artifacts
        run: ls -lh dist/

      - name: combine checksums
        run: cat dist/*.sha256 > dist/checksums.txt && rm dist/*.sha256

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          gh release create "$TAG" dist/debeasy-* dist/checksums.txt \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes
