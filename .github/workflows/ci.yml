name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel older runs of the same branch — only the latest commit matters.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: ./...

  test:
    name: test + coverage
    runs-on: ubuntu-latest
    # Spin up the same dev databases we use locally so integration tests have real
    # targets without anyone having to juggle secrets.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: debeasy
          POSTGRES_PASSWORD: debeasy
          POSTGRES_DB: postgres
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U debeasy"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: debeasy
          MYSQL_DATABASE: debeasy
          MYSQL_USER: debeasy
          MYSQL_PASSWORD: debeasy
        ports:
          - 53306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -pdebeasy"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: grant debeasy user full mysql privileges
        env:
          MYSQL_PWD: debeasy
        run: |
          mysql -h 127.0.0.1 -P 53306 -uroot -e \
            "GRANT ALL PRIVILEGES ON *.* TO 'debeasy'@'%' WITH GRANT OPTION; FLUSH PRIVILEGES;"

      - name: go vet
        run: go vet ./...

      - name: go test with coverage (unit + integration)
        run: |
          go test -tags=integration -race -count=1 -timeout=3m \
            -coverprofile=coverage.out -covermode=atomic ./...

      - name: coverage summary
        run: |
          echo "### coverage summary" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | tail -1 | tee -a $GITHUB_STEP_SUMMARY

      - name: coverage gate (minimum 75%)
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total/ { gsub("%",""); print $3 }')
          echo "coverage = ${pct}%"
          awk -v p="$pct" 'BEGIN { exit (p+0 >= 75) ? 0 : 1 }' \
            || { echo "::error::coverage ${pct}% is below the 75% floor"; exit 1; }

      - name: upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 14

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: cross-compile
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -trimpath -ldflags='-s -w' \
            -o "dist/debeasy-${GOOS}-${GOARCH}" ./cmd/debeasy
          ls -lh dist/
